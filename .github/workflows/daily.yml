name: Daily AI Digest

# Avoid two digest runs committing at once (reduces push races).
concurrency:
  group: daily-ai-digest-${{ github.repository }}
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 23 * * *"  # 每天 UTC 23:00 = 北京时间次日 07:00（落在 DeepSeek 夜间半价时段 00:30-08:30 内）
  workflow_dispatch:       # 支持手动触发

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允许提交文件到仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run aggregator
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LOOKBACK_DAYS: "3"
        run: python main.py

      - name: Send digest to Feishu
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
        run: |
          if [ -z "${FEISHU_APP_ID:-}" ] || [ -z "${FEISHU_APP_SECRET:-}" ] || [ -z "${FEISHU_RECEIVE_ID:-}" ]; then
            echo "Feishu secrets not set (FEISHU_APP_ID / FEISHU_APP_SECRET / FEISHU_RECEIVE_ID); skip."
            exit 0
          fi
          # 默认取 output/ 下最新 .md（刚生成的日报）；也可用 secrets 或此处写死路径
          python3 sender/send_feishu.py

      - name: Commit output
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "daily digest $(date -u +%Y-%m-%d)"
          # Remote may have moved (e.g. manual push). Rebase our commit on top, then push.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git pull --rebase origin main && git push origin main; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 15))
          done
